<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESM3 自动蛋白设计 Agent</title>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 920px;
      margin: 1.5rem auto;
      line-height: 1.5;
      padding: 0 1rem;
      color: #1b1f23;
      background: #f8fafc;
    }
    h1 { margin-bottom: .5rem; }
    .muted { color: #5f6b7a; }
    code { background: #eef2f7; padding: 2px 6px; border-radius: 4px; }
    .card {
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 1rem;
      margin: 1rem 0;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }
    .chat-window {
      height: 420px;
      overflow: auto;
      border: 1px solid #d7dee7;
      border-radius: 10px;
      padding: .8rem;
      background: #fbfdff;
      display: flex;
      flex-direction: column;
      gap: .7rem;
    }
    .msg {
      max-width: 88%;
      border-radius: 10px;
      padding: .6rem .75rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user { align-self: flex-end; background: #dbeafe; border: 1px solid #bfdbfe; }
    .assistant { align-self: flex-start; background: #f1f5f9; border: 1px solid #dce3ea; }
    .controls {
      margin-top: .8rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .6rem;
    }
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      min-height: 84px;
      padding: .7rem;
      resize: vertical;
      font: inherit;
    }
    button {
      border: 1px solid #1d4ed8;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      padding: .65rem .9rem;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
    }
    button.secondary { background: #fff; color: #1e40af; }
    button:disabled { opacity: .6; cursor: wait; }
    .quick-actions {
      margin-top: .7rem;
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .status { margin-top: .45rem; font-size: .95rem; }
    .result-meta {
      margin-top: .7rem;
      border-top: 1px dashed #cbd5e1;
      padding-top: .7rem;
      font-size: .95rem;
      color: #334155;
    }
    .row { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .jump-link { font-size: .92rem; }
    .sequence-box {
      margin-top: .5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      align-items: start;
    }
    .sequence-box textarea {
      min-height: 110px;
      max-height: 180px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .85rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    pre {
      margin: .5rem 0 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #f8fafc;
      border: 1px solid #d7dee7;
      border-radius: 8px;
      padding: .7rem;
      max-height: 340px;
      overflow: auto;
      font-size: .82rem;
    }
  </style>
</head>
<body>
  <h1>🧬 ESM3 自动蛋白设计 Agent</h1>
  <p class="muted">不只支持 curl。你可以在这个页面直接连续多轮对话，就像聊天助手一样。</p>

  <div class="card">
    <p>系统能力：</p>
    <ul>
      <li>自动设计 GFP 变体</li>
      <li>自动筛选 + 评分</li>
      <li>自动迭代优化</li>
      <li>返回最佳候选与结构化信息</li>
    </ul>
    <p class="muted">API 仍可用：<code>POST /design_protein</code>、<code>POST /chat_reasoning</code></p>
  </div>

  <div class="card">
    <h2 style="margin-top:0">交互式对话</h2>
    <div id="chatWindow" class="chat-window" aria-live="polite"></div>

    <div class="controls">
      <textarea id="prompt" placeholder="例如：请自动设计 GFP 变体并迭代优化，尽量保留 GSG motif，避免 C。"></textarea>
      <div style="display:flex; flex-direction:column; gap:.5rem;">
        <button id="sendBtn">发送</button>
        <button id="clearBtn" class="secondary">清空会话</button>
      </div>
    </div>

    <div class="quick-actions">
      <button class="secondary" data-q="请自动设计 GFP 并迭代优化">示例：自动迭代</button>
      <button class="secondary" data-q="请做更严格筛选，并加入 GSG motif">示例：筛选 + motif</button>
      <button class="secondary" data-q="请帮助我理解你返回的候选分数">示例：解释结果</button>
    </div>

    <div id="status" class="status muted"></div>
    <div id="meta" class="result-meta" hidden></div>
  </div>

  <div id="fullResult" class="card" hidden>
    <div class="row">
      <h2 style="margin:0">完整候选结果</h2>
      <a id="jumpLink" class="jump-link" href="#fullResult">已自动跳转入口</a>
      <button id="copyJsonBtn" class="secondary" type="button">复制完整 JSON</button>
    </div>
    <p class="muted" style="margin:.45rem 0;">该结果由页面自动调用 <code>POST /design_protein</code> 获取，参数基于你最近一条用户输入推断。</p>
    <pre id="fullResultJson"></pre>
  </div>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusEl = document.getElementById('status');
    const metaEl = document.getElementById('meta');
    const quickButtons = document.querySelectorAll('[data-q]');
    const fullResultCard = document.getElementById('fullResult');
    const fullResultJson = document.getElementById('fullResultJson');
    const copyJsonBtn = document.getElementById('copyJsonBtn');

    const conversation = [
      { role: 'assistant', content: '你好，我是 ESM3 设计助手。你可以直接说目标（如 GFP、motif、禁用氨基酸、迭代轮数），我会自动调用设计流程并总结结果。' }
    ];

    let latestSequence = '';
    let previousBestSequence = '';
    let latestFullResult = null;
    let latestReasoningContext = null;

    function renderConversation() {
      chatWindow.innerHTML = '';
      for (const msg of conversation) {
        const div = document.createElement('div');
        div.className = `msg ${msg.role === 'user' ? 'user' : 'assistant'}`;
        div.textContent = msg.content;
        chatWindow.appendChild(div);
      }
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function formatMetric(value, digits = 3) {
      const num = Number(value);
      return Number.isFinite(num) ? num.toFixed(digits) : '-';
    }

    function candidateMetricBits(candidate) {
      const metrics = candidate?.metrics || {};
      const bits = [];
      if (Number.isFinite(Number(metrics.mean_plddt))) bits.push(`pLDDT ${formatMetric(metrics.mean_plddt, 1)}`);
      if (Number.isFinite(Number(metrics.ptm))) bits.push(`pTM ${formatMetric(metrics.ptm, 3)}`);
      if (Number.isFinite(Number(metrics.structure_confidence))) bits.push(`conf ${formatMetric(metrics.structure_confidence, 3)}`);
      if (Number.isFinite(Number(metrics.motif_penalty))) bits.push(`motif penalty ${formatMetric(metrics.motif_penalty, 3)}`);
      if (Number.isFinite(Number(metrics.length_penalty))) bits.push(`length penalty ${formatMetric(metrics.length_penalty, 3)}`);
      return bits;
    }

    function setBusy(isBusy) {
      sendBtn.disabled = isBusy;
      promptEl.disabled = isBusy;
      statusEl.textContent = isBusy ? '正在设计并评分，请稍候…' : '';
    }

    function buildDesignRequest(content) {
      const text = String(content || '').toLowerCase();
      const req = {
        task: content,
        max_iterations: 3,
        candidates_per_round: 8,
      };
      if (text.includes('迭代')) req.max_iterations = 5;
      if (text.includes('筛选')) req.candidates_per_round = 12;
      return req;
    }

    function isReasoningQuery(content) {
      const text = String(content || '').trim();
      if (!text) return false;
      const reasoningPattern = /(解释|分析|为什么|为何|理由|依据|怎么看|评价|总结|概括|对比|比较|是否值得|适合验证|更适合|优先验证|风险|下一步|候选|explain|why|compare)/i;
      const actionPattern = /(自动设计|设计|生成|优化|迭代|继续优化|继续跑|重新|再来|筛选|打分|突变|design|generate|optimize)/i;
      if (!reasoningPattern.test(text)) return false;
      if (/(当前|这个|该|上一轮|候选|最佳序列|结果|current|candidate|result)/i.test(text)) return true;
      return !actionPattern.test(text);
    }

    async function fetchFullDesignResult(lastUserContent) {
      const requestBody = buildDesignRequest(lastUserContent);
      const resp = await fetch('/design_protein', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
      });
      if (!resp.ok) {
        throw new Error(`完整结果请求失败 HTTP ${resp.status}`);
      }
      const data = await resp.json();
      latestFullResult = data;
      latestReasoningContext = {
        version: 1,
        chat_mode: 'execution',
        current_mode: 'design',
        latest_result: data,
        previous_best_sequence: previousBestSequence || null,
        latest_best_sequence: data?.best_candidate?.sequence || latestSequence || null,
      };
      fullResultCard.hidden = false;
      fullResultJson.textContent = JSON.stringify(data, null, 2);
    }

    function renderMeta(data) {
      if (!data || !data.best_candidate) {
        metaEl.hidden = true;
        metaEl.innerHTML = '';
        latestSequence = '';
        return;
      }
      const c = data.best_candidate;
      const metricBits = candidateMetricBits(c);
      previousBestSequence = latestSequence;
      latestSequence = c.sequence || '';
      metaEl.hidden = false;
      metaEl.innerHTML = [
        `<div><strong>最近一次最佳候选：</strong> ${c.id || '-'}</div>`,
        `<div>score: ${Number(c.score ?? 0).toFixed(3)}；round: ${c.round ?? '-'}；total_generated: ${data.total_generated ?? '-'}</div>`,
        metricBits.length ? `<div>${metricBits.join('；')}</div>` : '',
        '<div class="sequence-box">',
        `<textarea readonly id="bestSequenceArea">${latestSequence || '-'}</textarea>`,
        '<button type="button" id="copySeqBtn" class="secondary">复制序列</button>',
        '</div>',
        '<div class="row" style="margin-top:.45rem;">',
        '<a class="jump-link" href="#fullResult">跳转查看完整候选明细 ↓</a>',
        '</div>'
      ].join('');

      const copySeqBtn = document.getElementById('copySeqBtn');
      if (copySeqBtn) {
        copySeqBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(latestSequence || '');
            copySeqBtn.textContent = '已复制';
            setTimeout(() => { copySeqBtn.textContent = '复制序列'; }, 1200);
          } catch {
            copySeqBtn.textContent = '复制失败';
            setTimeout(() => { copySeqBtn.textContent = '复制序列'; }, 1200);
          }
        });
      }
    }

    async function sendMessage(text) {
      const content = (text ?? promptEl.value).trim();
      if (!content) return;

      conversation.push({ role: 'user', content });
      renderConversation();
      if (!text) promptEl.value = '';

      setBusy(true);
      try {
        const reasoning = isReasoningQuery(content);
        const resp = await fetch('/chat_reasoning', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: content,
            conversation: conversation.slice(0, -1),
            latest_result: latestFullResult,
            previous_best_sequence: previousBestSequence || null,
            current_mode: 'design',
          })
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const data = await resp.json();
        latestReasoningContext = data?.reasoning_context || latestReasoningContext;
        const message = data?.reply || '收到响应，但未解析到文本内容。';
        conversation.push({ role: 'assistant', content: message });
        renderConversation();
        renderMeta(data);

        if (!reasoning && data?.chat_mode !== 'reasoning') {
          try {
            await fetchFullDesignResult(content);
          } catch (err) {
            latestFullResult = null;
            fullResultCard.hidden = false;
            fullResultJson.textContent = `无法自动获取完整候选明细：${err.message}`;
          }
        }
      } catch (err) {
        conversation.push({ role: 'assistant', content: `请求失败：${err.message}` });
        renderConversation();
        renderMeta(null);
      } finally {
        setBusy(false);
      }
    }

    sendBtn.addEventListener('click', () => sendMessage());
    promptEl.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        sendMessage();
      }
    });
    clearBtn.addEventListener('click', () => {
      conversation.splice(0, conversation.length, {
        role: 'assistant',
        content: '会话已清空。请告诉我你的设计目标，例如：设计 GFP、加入 GSG motif、禁用 C 并迭代 5 轮。'
      });
      renderConversation();
      renderMeta(null);
      fullResultCard.hidden = true;
      fullResultJson.textContent = '';
      latestFullResult = null;
      latestReasoningContext = null;
      previousBestSequence = '';
      promptEl.focus();
    });

    for (const btn of quickButtons) {
      btn.addEventListener('click', () => sendMessage(btn.dataset.q));
    }

    copyJsonBtn.addEventListener('click', async () => {
      const txt = latestFullResult ? JSON.stringify(latestFullResult, null, 2) : fullResultJson.textContent;
      if (!txt) return;
      try {
        await navigator.clipboard.writeText(txt);
        copyJsonBtn.textContent = '已复制';
        setTimeout(() => { copyJsonBtn.textContent = '复制完整 JSON'; }, 1200);
      } catch {
        copyJsonBtn.textContent = '复制失败';
        setTimeout(() => { copyJsonBtn.textContent = '复制完整 JSON'; }, 1200);
      }
    });

    renderConversation();
  </script>
</body>
</html>
